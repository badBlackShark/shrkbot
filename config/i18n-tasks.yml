base_locale: en
locales: [en]

data:
  read:
    - config/locales/*.%{locale}.yml
  write:
    - ["activity_log.*", "config/locales/activity_log.%{locale}.yml"]
    - ["views.imprint.*", "config/locales/legal.%{locale}.yml"]
    - ["views.privacy_policy.*", "config/locales/legal.%{locale}.yml"]
    - ["views.terms_of_service.*", "config/locales/legal.%{locale}.yml"]
    - ["components.legal_page.*", "config/locales/legal.%{locale}.yml"]
    - "config/locales/web.%{locale}.yml"

# Relative keys in Views::Servers::Moderation::SubPluginShow resolve at runtime
# against the SUBCLASS scope (spam_protection/image_scanning show), which the
# static file-path scoping above cannot see.
ignore_missing:
  - views.servers.moderation.sub_plugin_show.*

ignore_unused:
  - views.servers.spam_protection.show.*
  - views.servers.image_scanning.show.*

search:
  paths:
    - app/
  # Phlex views/components are Ruby classes, so a relative `t(".key")` is scoped
  # by the class name (Views::Servers::Index -> views.servers.index). Rooting at
  # `app` makes the file path resolve to the same scope; excluding the method
  # name stops i18n-tasks appending the enclosing method (Phlex scopes by class,
  # not method).
  relative_roots:
    - app
  relative_exclude_method_name_paths:
    - app
