<!-- @dsCard group="Colors" viewport="700x190" name="Brand · Teal" subtitle="The brand accent — #37a79e · 600+ for white-text fills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .row { display: flex; gap: var(--space-3); }
  .sw { flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .nm { font-size: var(--text-xs); font-weight: var(--weight-semibold); }
  .hx { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .star { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--teal-50)"></div><div class="nm">50</div><div class="hx">#eef8f6</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-100)"></div><div class="nm">100</div><div class="hx">#d2ece8</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-200)"></div><div class="nm">200</div><div class="hx">#a8dcd5</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-300)"></div><div class="nm">300</div><div class="hx">#73c6bd</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-400)"></div><div class="nm">400</div><div class="hx">#4fb5ab</div></div>
    <div class="sw"><div class="chip star" style="background:var(--teal-500)"></div><div class="nm">500 ★</div><div class="hx">#37a79e</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-600)"></div><div class="nm">600 ▪</div><div class="hx">#2c867f</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-700)"></div><div class="nm">700</div><div class="hx">#266c66</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-800)"></div><div class="nm">800</div><div class="hx">#235753</div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-900)"></div><div class="nm">900</div><div class="hx">#1f4845</div></div>
  </div>
</body>
</html>
