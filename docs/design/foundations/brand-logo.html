<!-- @dsCard group="Brand" viewport="700x230" name="Mascot & Logo" subtitle="Mechanical shark biting a wrench — on brand teal" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); display: flex; gap: var(--space-6); align-items: center; }
  .mark { width: 150px; height: 150px; border-radius: var(--radius-lg); object-fit: cover; flex: none; box-shadow: var(--shadow-md); }
  .lockup { display: flex; align-items: center; gap: var(--space-3); }
  .badge { width: 44px; height: 44px; border-radius: var(--radius-md); object-fit: cover; }
  .word { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--weight-bold); letter-spacing: var(--tracking-tight); }
  .word .shrk { color: var(--accent); }
  .word .bot  { color: var(--accent-2); }
  .note { font-size: var(--text-sm); color: var(--text-secondary); margin-top: var(--space-3); max-width: 42ch; line-height: var(--leading-normal); }
</style>
</head>
<body>
  <img class="mark" src="../assets/shrkbot-mascot.png" alt="shrkbot mascot" />
  <div>
    <div class="lockup">
      <img class="badge" src="../assets/shrkbot-mascot.png" alt="" />
      <div class="word"><span class="shrk">shrk</span><span class="bot">bot</span></div>
    </div>
    <div class="note">A tool-jawed shark: equal parts playful and mechanical. Always lowercase. <span class="shrk">shrk</span> in teal (the brand), <span class="bot">bot</span> in copper (the tool). The wordmark sits on cream or brand teal — never stretched, never recolored.</div>
  </div>
</body>
</html>
