<!-- @dsCard group="Type" viewport="700x160" name="Mono · IBM Plex Mono" subtitle="Slash-commands, IDs, technical strings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .cmd { font-size: var(--text-md); font-weight: var(--weight-medium); }
  .cmd .slash { color: var(--accent); }
  .row { display: flex; gap: var(--space-2); margin-top: var(--space-4); flex-wrap: wrap; }
  .tag { font-size: var(--text-xs); background: var(--surface-sunken); border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: 4px 8px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="cmd"><span class="slash">/</span>remind <span style="color:var(--text-muted)">in:</span> 2h <span style="color:var(--text-muted)">message:</span> stand up</div>
  <div class="row">
    <span class="tag">/info</span><span class="tag">/donate</span><span class="tag">/reminders</span><span class="tag">/unremind</span><span class="tag">ACCENT 0x39afe5</span>
  </div>
</body>
</html>
