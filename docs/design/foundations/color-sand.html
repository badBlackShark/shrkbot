<!-- @dsCard group="Colors" viewport="700x200" name="Neutral · Sand" subtitle="Warm cream ramp — text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .row { display: flex; gap: var(--space-2); }
  .sw { flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .nm { font-size: 10px; font-weight: var(--weight-semibold); }
  .hx { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sand-0)"></div><div class="nm">0</div><div class="hx">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-50)"></div><div class="nm">50</div><div class="hx">#f5f0e8</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><div class="nm">100</div><div class="hx">#ebe4d7</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><div class="nm">200</div><div class="hx">#dcd2c0</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><div class="nm">300</div><div class="hx">#c5b8a1</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-400)"></div><div class="nm">400</div><div class="hx">#a3947d</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-500)"></div><div class="nm">500</div><div class="hx">#7e7160</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-600)"></div><div class="nm">600</div><div class="hx">#5f5547</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-700)"></div><div class="nm">700</div><div class="hx">#473f35</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-800)"></div><div class="nm">800</div><div class="hx">#2f2a23</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-900)"></div><div class="nm">900</div><div class="hx">#1d1a15</div></div>
  </div>
</body>
</html>
