<!-- @dsCard group="Colors" viewport="700x190" name="Brand · Sky" subtitle="The one accent — BotConfig::ACCENT_COLOR 0x39afe5" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .row { display: flex; gap: var(--space-3); }
  .sw { flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .nm { font-size: var(--text-xs); font-weight: var(--weight-semibold); }
  .hx { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .star { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sky-50)"></div><div class="nm">50</div><div class="hx">#ecf8fe</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-100)"></div><div class="nm">100</div><div class="hx">#cfeefc</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-200)"></div><div class="nm">200</div><div class="hx">#a6e0f9</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-300)"></div><div class="nm">300</div><div class="hx">#6fccf3</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-400)"></div><div class="nm">400</div><div class="hx">#4cb9ec</div></div>
    <div class="sw"><div class="chip star" style="background:var(--sky-500)"></div><div class="nm">500 ★</div><div class="hx">#39afe5</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-600)"></div><div class="nm">600</div><div class="hx">#1f8fc4</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-700)"></div><div class="nm">700</div><div class="hx">#1a729e</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-800)"></div><div class="nm">800</div><div class="hx">#1b5f80</div></div>
    <div class="sw"><div class="chip" style="background:var(--sky-900)"></div><div class="nm">900</div><div class="hx">#1c506b</div></div>
  </div>
</body>
</html>
