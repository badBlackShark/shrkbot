<!-- @dsCard group="Colors" viewport="700x200" name="Neutral · Slate" subtitle="Cool slate ramp — text, surfaces, borders" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .row { display: flex; gap: var(--space-2); }
  .sw { flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,.06); }
  .nm { font-size: 10px; font-weight: var(--weight-semibold); }
  .hx { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slate-0)"></div><div class="nm">0</div><div class="hx">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="nm">50</div><div class="hx">#f4f6f8</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="nm">100</div><div class="hx">#e9edf1</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="nm">200</div><div class="hx">#d7dee5</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="nm">300</div><div class="hx">#b9c4cf</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="nm">400</div><div class="hx">#8b99a7</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="nm">500</div><div class="hx">#677483</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><div class="nm">600</div><div class="hx">#4d5763</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="nm">700</div><div class="hx">#3a424c</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-800)"></div><div class="nm">800</div><div class="hx">#262c33</div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><div class="nm">900</div><div class="hx">#161a1f</div></div>
  </div>
</body>
</html>
