<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--discord-bg); color: var(--discord-text); padding: var(--space-6); }
  .container { background: var(--discord-card); border-left: 4px solid var(--accent); border-radius: var(--radius-sm); padding: var(--space-4) var(--space-5); max-width: 460px; }
  h3 { margin: 0 0 var(--space-1); font-size: var(--text-md); font-weight: var(--weight-bold); }
  p { margin: 0; font-size: var(--text-sm); line-height: var(--leading-normal); }
  a { color: var(--discord-link); text-decoration: none; }
  .sep { height: 1px; background: var(--discord-divider); margin: var(--space-3) 0; }
  .sub { color: var(--discord-text-dim); font-size: var(--text-xs); }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: var(--space-3); }
</style>
</head>
<body>
  <div class="container">
    <h3>shrkbot</h3>
    <p>I was written in <a href="#">Ruby</a> by <a href="#">badBlackShark</a>. Want me on your server? <a href="#">Invite me!</a></p>
    <div class="sep"></div>
    <p class="sub">Want to support the project? Use /donate.</p>
  </div>
  <div class="cap">accent border = 0x39afe5 · type 17 container</div>
</body>
</html>
