<!-- @dsCard group="Type" viewport="700x240" name="Type Scale" subtitle="xs → 2xl, ~1.2 ratio" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-display); background: var(--surface-card); color: var(--text-primary); padding: var(--space-6); }
  .line { display: flex; align-items: baseline; gap: var(--space-4); padding: 3px 0; }
  .tk { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 110px; flex: none; }
  .sp { font-weight: var(--weight-semibold); letter-spacing: var(--tracking-tight); white-space: nowrap; }
</style>
</head>
<body>
  <div class="line"><span class="tk">2xl · 36</span><span class="sp" style="font-size:var(--text-2xl)">shrkbot</span></div>
  <div class="line"><span class="tk">xl · 28</span><span class="sp" style="font-size:var(--text-xl)">shrkbot</span></div>
  <div class="line"><span class="tk">lg · 22</span><span class="sp" style="font-size:var(--text-lg)">shrkbot</span></div>
  <div class="line"><span class="tk">md · 18</span><span class="sp" style="font-size:var(--text-md)">shrkbot</span></div>
  <div class="line"><span class="tk">base · 16</span><span class="sp" style="font-size:var(--text-base)">shrkbot</span></div>
  <div class="line"><span class="tk">sm · 14</span><span class="sp" style="font-size:var(--text-sm)">shrkbot</span></div>
  <div class="line"><span class="tk">xs · 12</span><span class="sp" style="font-size:var(--text-xs)">shrkbot</span></div>
</body>
</html>
