<!-- @dsCard group="Components" viewport="700x470" name="Controls" subtitle="Buttons · badges · switch · checkbox · inputs · selects" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Exo+2:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../tokens/colors.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand:{50:'#eef8f6',100:'#d2ece8',200:'#a8dcd5',300:'#73c6bd',400:'#4fb5ab',500:'#37a79e',600:'#2c867f',700:'#266c66',800:'#235753',900:'#1f4845'},
      copper:{50:'#fbf1ea',100:'#f5dcca',200:'#e9b99c',300:'#dc9268',400:'#d27a45',500:'#c4622d',600:'#a44f23',700:'#823f1f'},
      ink:{0:'#fff',25:'#faf7f1',50:'#f5f0e8',100:'#ebe4d7',200:'#dcd2c0',300:'#c5b8a1',400:'#a3947d',500:'#7e7160',600:'#5f5547',700:'#473f35',800:'#2f2a23',900:'#1d1a15',card:'#fdfbf7'},
      success:'#2faf6b','success-soft':'#e7f4ec',warning:'#e8a13a','warning-soft':'#f8efdc',danger:'#e0533d','danger-soft':'#f8e7e2' },
    fontFamily:{ display:['"Space Grotesk"','system-ui','sans-serif'], sans:['"Exo 2"','system-ui','sans-serif'], mono:['"IBM Plex Mono"','ui-monospace','monospace'] },
    borderRadius:{ sm:'5px', md:'8px', lg:'12px', xl:'16px', chip:'5px', control:'8px', card:'12px' },
    boxShadow:{ sm:'0 1px 3px rgba(29,26,21,.08),0 1px 2px rgba(29,26,21,.04)' } } } };
</script>
<style>
  body{font-family:"Exo 2",system-ui,sans-serif}
  .lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a3947d}
  /* Chamfer — plugin identity tile */
  .chamfer-tile{--cut:var(--chamfer,12px);clip-path:polygon(var(--cut) 0,calc(100% - var(--cut)) 0,100% var(--cut),100% calc(100% - var(--cut)),calc(100% - var(--cut)) 100%,var(--cut) 100%,0 calc(100% - var(--cut)),0 var(--cut))}
  .chamfer-cta{--cut:var(--chamfer-sm,6px);clip-path:polygon(var(--cut) 0,calc(100% - var(--cut)) 0,100% var(--cut),100% calc(100% - var(--cut)),calc(100% - var(--cut)) 100%,var(--cut) 100%,0 calc(100% - var(--cut)),0 var(--cut));border-radius:0 !important}
  /* Phosphor icon sizing */
  i[class*="ph-"]{display:inline-flex;align-items:center;justify-content:center;line-height:1;flex:none;font-style:normal}
  i[class*="ph-"].w-3{font-size:12px;min-width:12px;height:12px}
  i[class*="ph-"].w-3\.5{font-size:14px;min-width:14px;height:14px}
  i[class*="ph-"].w-4{font-size:16px;min-width:16px;height:16px}
  i[class*="ph-"].w-5{font-size:20px;min-width:20px;height:20px}
</style>
</head>
<body class="bg-ink-50 text-ink-900 p-6">
  <div class="flex flex-col gap-6">

    <div class="flex items-center gap-3 flex-wrap">
      <span class="lbl w-full">Buttons</span>
      <button class="h-10 px-4 inline-flex items-center gap-2 chamfer-cta bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition-colors">Save changes</button>
      <button class="h-10 px-4 inline-flex items-center gap-2 rounded-control bg-ink-card border border-ink-300 text-sm font-semibold hover:bg-ink-100 transition"><i class="ph ph-plus w-4 h-4"></i> Add role set</button>
      <button class="h-10 px-4 inline-flex items-center rounded-control text-ink-600 text-sm font-semibold hover:bg-ink-100 transition">Cancel</button>
      <button class="h-10 px-4 inline-flex items-center rounded-control bg-danger hover:bg-danger/90 text-white text-sm font-semibold transition">Remove</button>
      <button class="h-10 px-4 inline-flex items-center chamfer-cta bg-brand-600 text-white text-sm font-semibold opacity-50 cursor-not-allowed" disabled>Disabled</button>
      <button class="h-8 px-3 inline-flex items-center chamfer-cta bg-brand-600 text-white text-xs font-semibold">Small</button>
    </div>

    <div class="flex items-center gap-2.5 flex-wrap">
      <span class="lbl w-full">Badges</span>
      <span class="inline-flex items-center gap-1.5 text-xs font-semibold text-success bg-success-soft px-2.5 py-1 rounded-chip"><span class="w-1.5 h-1.5 rounded-full bg-success"></span>Enabled</span>
      <span class="inline-flex items-center gap-1.5 text-xs font-semibold text-ink-500 bg-ink-100 px-2.5 py-1 rounded-chip"><span class="w-1.5 h-1.5 rounded-full bg-ink-400"></span>Off</span>
      <span class="text-xs font-semibold text-brand-700 bg-brand-50 px-2.5 py-1 rounded-chip">Global</span>
      <span class="text-xs font-semibold px-2.5 py-1 rounded-chip" style="color:var(--accent-2-text);background:var(--accent-2-soft)">Pro tip</span>
      <span class="inline-flex items-center gap-1.5 text-xs font-semibold text-warning bg-warning-soft px-2.5 py-1 rounded-chip"><span class="w-1.5 h-1.5 rounded-full bg-warning"></span>Needs setup</span>
      <span class="text-xs font-semibold text-danger bg-danger-soft px-2.5 py-1 rounded-chip">Error</span>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="flex flex-col gap-3">
        <span class="lbl">Switch &amp; Checkbox</span>
        <div class="flex items-center gap-4">
          <button role="switch" aria-checked="true" data-on="true" onclick="toggleSwitch(this)"
            style="position:relative;width:46px;height:26px;flex:none;border:none;border-radius:999px;cursor:pointer;padding:0;background:#2c867f;transition:background 180ms cubic-bezier(.2,0,0,1);outline:none">
            <span style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transform:translateX(20px);transition:transform 220ms cubic-bezier(.2,0,0,1)"></span>
          </button>
          <button role="switch" aria-checked="false" data-on="false" onclick="toggleSwitch(this)"
            style="position:relative;width:46px;height:26px;flex:none;border:none;border-radius:999px;cursor:pointer;padding:0;background:#c5b8a1;transition:background 180ms cubic-bezier(.2,0,0,1);outline:none">
            <span style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transform:translateX(0);transition:transform 220ms cubic-bezier(.2,0,0,1)"></span>
          </button>
          <button role="switch" aria-checked="true" disabled
            style="position:relative;width:46px;height:26px;flex:none;border:none;border-radius:999px;cursor:not-allowed;padding:0;background:#2c867f;opacity:.45;outline:none">
            <span style="position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transform:translateX(20px)"></span>
          </button>
        </div>
        <label class="flex items-start gap-3 cursor-pointer">
          <span class="w-5 h-5 mt-0.5 flex-none rounded-chip bg-brand-600 grid place-items-center"><i class="ph-fill ph-check w-3 h-3 text-white"></i></span>
          <span><span class="text-sm font-medium">Force DM reminders</span><span class="block text-xs text-ink-500 mt-0.5">Deliver to DMs even when a channel is set.</span></span>
        </label>
      </div>
      <div class="flex flex-col gap-3">
        <span class="lbl">Text input</span>
        <input value="Welcome {user}!" class="w-full h-10 px-3 rounded-control border-[1.5px] border-ink-300 bg-ink-card text-sm focus:border-brand-500 focus:outline-none focus:ring-[3px] focus:ring-brand-500/30" />
        <div class="h-10 px-3 rounded-control border-[1.5px] border-brand-500 ring-[3px] ring-brand-500/30 bg-ink-card flex items-center text-sm text-ink-400">Focused field</div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div class="flex flex-col gap-2">
        <span class="lbl">Channel select</span>
        <div class="h-10 px-3 rounded-control border-[1.5px] border-ink-300 bg-ink-card flex items-center gap-2 text-sm"><span class="font-mono text-ink-400">#</span> mod-log <i class="ph ph-caret-down w-4 h-4 text-ink-400 ml-auto"></i></div>
      </div>
      <div class="flex flex-col gap-2">
        <span class="lbl">Role multi-select</span>
        <div class="min-h-10 px-2.5 py-1.5 rounded-control border-[1.5px] border-ink-300 bg-ink-card flex items-center gap-1.5 flex-wrap text-sm">
          <span class="inline-flex items-center gap-1.5 pl-2 pr-1.5 py-1 bg-brand-50 border border-brand-200 rounded-chip text-brand-700 text-xs font-medium"><span class="w-2.5 h-2.5 rounded-full bg-brand-500"></span>Valorant pings <span class="text-brand-600">✕</span></span>
          <span class="inline-flex items-center gap-1.5 pl-2 pr-1.5 py-1 bg-brand-50 border border-brand-200 rounded-chip text-brand-700 text-xs font-medium"><span class="w-2.5 h-2.5 rounded-full bg-success"></span>Minecraft pings <span class="text-brand-600">✕</span></span>
          <i class="ph ph-caret-down w-4 h-4 text-ink-400 ml-auto"></i>
        </div>
      </div>
    </div>

  </div>
  <script>
    function toggleSwitch(btn){
      const on = btn.dataset.on !== 'true';
      btn.dataset.on = on;
      btn.setAttribute('aria-checked', on);
      btn.style.background = on ? '#2c867f' : '#c5b8a1';
      btn.querySelector('span').style.transform = on ? 'translateX(20px)' : 'translateX(0)';
    }
  </script>
</body>
</html>
