name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  schedule:
    # Nightly dependency audit; CVE feeds change independently of our code, so a
    # new advisory must not surface as a red check on an unrelated PR.
    - cron: '0 6 * * *'

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan app code for security issues
        run: bin/brakeman

  audit_ruby_deps:
    runs-on: ubuntu-latest
    # Whole-lockfile scan; not diff-scoped, so keep it off PRs (main + nightly).
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

  audit_js_deps:
    runs-on: ubuntu-latest
    # Whole-lockfile scan; not diff-scoped, so keep it off PRs (main + nightly).
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  smells:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Advisory SRP/DRY signal; findings are input for human judgment, not a
      # gate. continue-on-error keeps a non-zero exit from failing the check.
      - name: Report code smells
        continue-on-error: true
        run: bundle exec reek app/ lib/

      - name: Report structural duplication
        continue-on-error: true
        run: bundle exec flay app/ lib/

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint code for consistent style
        run: bundle exec standardrb

  i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # `unused` is intentionally omitted: it can't see dynamic `t("#{...}")` calls.
      - name: Check for missing locale keys
        run: bundle exec i18n-tasks missing

      - name: Check locale files are normalized
        run: bundle exec i18n-tasks check-normalized

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      # The primary/dev database URL; the test suite derives <name>_test from it
      # (see config/database.yml), so specs run against postgres .../shrkbot_db_test.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/shrkbot_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare the test database
        run: bin/rails db:test:prepare

      - name: Build the Tailwind stylesheet (view specs render the layout)
        run: bin/rails tailwindcss:build

      - name: Check model validations and DB constraints stay in sync
        run: bundle exec rake active_record_doctor

      - name: Run specs
        run: bundle exec rspec

      - name: Check coverage of changed lines
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          bundle exec undercover --compare "origin/$BASE_REF"

